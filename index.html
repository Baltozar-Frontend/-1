<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberMesh // Anti-Block Edition</title>
    <style>
        :root {
            --bg: #0a0b10;
            --panel: #121420;
            --accent: #00ffcc;
            --text: #ffffff;
            --border: 1px solid rgba(0, 255, 204, 0.2);
        }
        body {
            margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
        }
        .container {
            display: grid; grid-template-columns: 1fr 220px; background: var(--panel);
            border: var(--border); border-radius: 12px; flex-grow: 1; overflow: hidden;
        }
        @media (max-width: 600px) { .container { grid-template-columns: 1fr; grid-template-rows: 1fr auto; } .sidebar { border-left: none !important; border-top: var(--border); max-height: 120px; } }
        
        .main-chat { display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; border-bottom: var(--border); background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; }
        h2 { margin: 0; color: var(--accent); text-transform: uppercase; font-size: 16px; letter-spacing: 1px; }
        .user-tag { font-size: 12px; color: #626880; }
        .user-tag b { color: var(--accent); }

        .chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; max-width: 85%; width: fit-content; }
        .msg.my-msg { background: rgba(0, 255, 204, 0.05); border-color: rgba(0, 255, 204, 0.2); align-self: flex-end; }
        .msg-meta { font-size: 11px; color: #626880; margin-bottom: 4px; display: flex; gap: 8px; }
        .msg-meta b { color: var(--accent); }

        .input-area { padding: 12px; border-top: var(--border); display: flex; gap: 8px; background: rgba(0,0,0,0.2); }
        input[type="text"] {
            background: #000; color: #fff; border: 1px solid rgba(255,255,255,0.1);
            padding: 12px; border-radius: 6px; flex-grow: 1; font-size: 14px; outline: none;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        button { background: linear-gradient(135deg, #00ffcc, #0099ff); border: none; color: #000; padding: 0 20px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; }

        .sidebar { background: rgba(0,0,0,0.15); border-left: var(--border); padding: 15px; display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar h3 { margin: 0 0 10px 0; font-size: 14px; color: #626880; text-transform: uppercase; }
        .online-user { display: flex; align-items: center; gap: 8px; font-size: 14px; margin-bottom: 6px; }
        .status-dot { width: 8px; height: 8px; background: #00ffcc; border-radius: 50%; box-shadow: 0 0 8px #00ffcc; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
</head>
<body>

    <div class="container">
        <div class="main-chat">
            <div class="header">
                <h2>🌐 CYBERMESH // STABLE NET</h2>
                <div class="user-tag">Профиль: <b id="profile-name">...</b></div>
            </div>
            <div class="chat-box" id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Введите сообщение в сеть..." maxlength="250">
                <button id="send-btn">Отправить</button>
            </div>
        </div>
        <div class="sidebar">
            <h3>В сети (<span id="online-count">0</span>)</h3>
            <div id="online-list"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://cbivrlziqtenfhrtxism.supabase.co";
        const SUPABASE_KEY = "sb_publishable_fe0ZmhwRL_K3vIVuvtZdtA_TdyUDOvm";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myName = localStorage.getItem('chat_user_name') || "NetRunner_" + Math.floor(Math.random() * 8999 + 1000);
        localStorage.setItem('chat_user_name', myName);
        document.getElementById('profile-name').innerText = myName;

        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const onlineList = document.getElementById('online-list');
        const onlineCount = document.getElementById('online-count');

        let lastMessageId = 0;
        let knownMessages = new Set();

        // ОБХОД БЛОКИРОВОК: Быстрый опрос базы данных каждые 1.5 секунды
        async function syncData() {
            try {
                // 1. Качаем только НОВЫЕ сообщения, которых у нас еще нет на экране
                const { data: messages, error: msgError } = await supabase
                    .from('cyber_messages')
                    .select('*')
                    .gt('id', lastMessageId)
                    .order('id', { ascending: true });

                if (!msgError && messages && messages.length > 0) {
                    messages.forEach(msg => {
                        if (!knownMessages.has(msg.id)) {
                            knownMessages.add(msg.id);
                            appendMessage(msg);
                            if (msg.id > lastMessageId) lastMessageId = msg.id;
                        }
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                }

                // 2. Обновляем статус нашей "активности" в базе данных
                await supabase.from('cyber_messages').insert([{ sender: `__ping__:${myName}`, message: 'ping' }]).select();
                
                // Чистим старые пинги, чтобы база не раздувалась
                await supabase.from('cyber_messages').delete().lt('created_at', new Date(Date.now() - 10000).toISOString()).like('sender', '__ping__:%');

                // 3. Считаем, кто живой в сети прямо сейчас (активничал последние 7 секунд)
                const { data: activeUsers } = await supabase
                    .from('cyber_messages')
                    .select('sender')
                    .gt('created_at', new Date(Date.now() - 7000).toISOString());

                if (activeUsers) {
                    let uniqueUsers = new Set();
                    activeUsers.forEach(u => {
                        if (u.sender.startsWith('__ping__:')) {
                            uniqueUsers.add(u.sender.replace('__ping__:', ''));
                        }
                    });

                    onlineList.innerHTML = "";
                    uniqueUsers.forEach(user => {
                        const uDiv = document.createElement('div');
                        uDiv.className = 'online-user';
                        uDiv.innerHTML = `<div class="status-dot"></div> <span>${user}</span>`;
                        onlineList.appendChild(uDiv);
                    });
                    onlineCount.innerText = uniqueUsers.size;
                }

            } catch (e) { console.log("Сетевая заминка, реконнект..."); }
        }

        function appendMessage(msg) {
            if (msg.sender.startsWith('__ping__:')) return; // игнорим системные пинги онлайна
            const isMe = msg.sender === myName;
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isMe ? 'my-msg' : ''}`;
            const time = new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            msgDiv.innerHTML = `
                <div class="msg-meta"><b>${msg.sender}</b> <span>${time}</span></div>
                <div class="msg-text">${msg.message}</div>
            `;
            chatBox.appendChild(msgDiv);
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            messageInput.value = "";
            await supabase.from('cyber_messages').insert([{ sender: myName, message: text }]);
            syncData(); // моментально обновляем у себя
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

        // Первая загрузка истории (последние 30 сообщений)
        async function init() {
            const { data } = await supabase.from('cyber_messages').select('*').not('sender', 'like', '__ping__:%').order('id', { ascending: false }).limit(30);
            if (data) {
                data.reverse().forEach(msg => {
                    knownMessages.add(msg.id);
                    appendMessage(msg);
                    if (msg.id > lastMessageId) lastMessageId = msg.id;
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }
            
            // Запускаем бесконечный стабильный цикл синхронизации
            setInterval(syncData, 1500);
            syncData();
        }

        init();
    </script>
</body>
</html>
