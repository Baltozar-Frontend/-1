<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberMesh // Global Chat</title>
    <style>
        :root {
            --bg: #0a0b10;
            --panel: #121420;
            --accent: #00ffcc;
            --text: #ffffff;
            --border: 1px solid rgba(0, 255, 204, 0.2);
        }
        body {
            margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
        }
        .container {
            display: flex; flex-direction: column; background: var(--panel);
            border: var(--border); border-radius: 12px; flex-grow: 1; overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.05);
        }
        .header {
            padding: 15px; border-bottom: var(--border); background: rgba(0,0,0,0.2);
            display: flex; justify-content: space-between; align-items: center;
        }
        h2 { margin: 0; color: var(--accent); text-transform: uppercase; font-size: 18px; letter-spacing: 1px; }
        .user-tag { font-size: 12px; color: #626880; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 4px; }
        .user-tag b { color: var(--accent); }

        .chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; max-width: 85%; width: fit-content; }
        .msg.my-msg { background: rgba(0, 255, 204, 0.05); border-color: rgba(0, 255, 204, 0.2); align-self: flex-end; }
        .msg-meta { font-size: 11px; color: #626880; margin-bottom: 4px; display: flex; gap: 8px; }
        .msg-meta b { color: var(--accent); }
        .msg-text { font-size: 14px; line-height: 1.4; word-break: break-word; }

        .input-area { padding: 12px; border-top: var(--border); display: flex; gap: 8px; background: rgba(0,0,0,0.2); }
        input[type="text"] {
            background: #000; color: #fff; border: 1px solid rgba(255,255,255,0.1);
            padding: 12px; border-radius: 6px; flex-grow: 1; font-size: 14px; outline: none;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        button {
            background: linear-gradient(135deg, #00ffcc, #0099ff); border: none; color: #000;
            padding: 0 20px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 13px;
        }
        button:active { opacity: 0.8; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/dist/umd/supabase.js"></script>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>🌐 CYBERMESH // GLOBAL CHAT</h2>
            <div class="user-tag">Твой профиль: <b id="profile-name">...</b></div>
        </div>

        <div class="chat-box" id="chat-box">
            </div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Введите сообщение в сеть..." maxlength="250">
            <button id="send-btn">Отправить</button>
        </div>
    </div>

    <script>
        // Подключение к твоей базе Supabase
        const SUPABASE_URL = "https://cbivrlziqtenfhrtxism.supabase.co";
        const SUPABASE_KEY = "sb_publishable_fe0ZmhwRL_K3vIVuvtZdtA_TdyUDOvm";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Работа с аккаунтом (сохраняется намертво в памяти устройства)
        let myName = localStorage.getItem('chat_user_name');
        if (!myName) {
            myName = "NetRunner_" + Math.floor(Math.random() * 8999 + 1000);
            localStorage.setItem('chat_user_name', myName);
        }
        document.getElementById('profile-name').innerText = myName;

        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // 1. Загрузка истории сообщений при старте
        async function loadHistory() {
            const { data, error } = await supabase
                .from('cyber_messages')
                .select('*')
                .order('id', { ascending: true })
                .limit(50);

            if (!error && data) {
                data.forEach(msg => appendMessage(msg));
                scrollToBottom();
            }
        }

        // 2. Функция добавления сообщения на экран
        function appendMessage(msg) {
            const isMe = msg.sender === myName;
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isMe ? 'my-msg' : ''}`;
            
            // Форматируем время
            const time = new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            msgDiv.innerHTML = `
                <div class="msg-meta">
                    <b>${msg.sender}</b>
                    <span>${time}</span>
                </div>
                <div class="msg-text">${msg.message}</div>
            `;
            chatBox.appendChild(msgDiv);
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 3. Отправка сообщения в базу данных
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            messageInput.value = ""; // Сразу очищаем поле ввода для скорости

            const { error } = await supabase
                .from('cyber_messages')
                .insert([{ sender: myName, message: text }]);

            if (error) {
                alert("Ошибка отправки: " + error.message);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // 4. НАСТОЯЩИЙ РЕАЛТАЙМ (Ловим новые сообщения из базы на лету)
        supabase
            .channel('global-chat')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'cyber_messages' }, payload => {
                appendMessage(payload.new);
                scrollToBottom();
            })
            .subscribe();

        // Запуск
        loadHistory();
    </script>
</body>
</html>
