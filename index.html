<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Guild Manager [Supabase]</title>
    <style>
        :root {
            --bg: #0a0b10;
            --panel: #121420;
            --accent: #00ffcc;
            --text: #ffffff;
            --text-dim: #626880;
            --border: 1px solid rgba(0, 255, 204, 0.2);
        }
        body {
            margin: 0; padding: 10px; font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
        }
        h1, h2, h3 { margin: 5px 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        #network-panel { background: var(--panel); border: var(--border); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .net-row { display: flex; gap: 8px; margin-top: 10px; }
        input[type="text"] { background: #000; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 4px; flex-grow: 1; }
        
        button {
            background: linear-gradient(135deg, #00ffcc, #0099ff); border: none; color: #000;
            padding: 8px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #game-interface { display: none; flex-grow: 1; grid-template-rows: auto 1fr; gap: 10px; overflow: hidden; }
        .stats-bar { display: flex; justify-content: space-around; background: var(--panel); padding: 10px; border-radius: 8px; border: var(--border); font-size: 18px; font-weight: bold; }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow: hidden; }
        @media (max-width: 600px) { .main-content { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; } }

        .panel-box { background: var(--panel); border: var(--border); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .scroll-list { flex-grow: 1; overflow-y: auto; margin-bottom: 5px; padding-right: 5px; }

        .farm-btn { background: linear-gradient(135deg, #ff0055, #9900cc); color: #fff; width: 100%; padding: 15px; font-size: 18px; margin-bottom: 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold;}
        .upg-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 8px; margin-bottom: 5px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        
        .chat-msg { font-size: 13px; margin-bottom: 4px; }
        .chat-msg b { color: var(--accent); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="network-panel">
        <h2>⚔️ Вход в Кибер-Клан</h2>
        <div id="setup-step">
            <button id="btn-create">Создать новый Клан</button>
            <div class="net-row">
                <input type="text" id="clan-id-input" placeholder="Введите ID Клана друга...">
                <button id="btn-join">Войти</button>
            </div>
        </div>
    </div>

    <div id="game-interface">
        <div class="stats-bar">
            <div>ID Клана: <span id="clan-id-display" style="color:var(--accent)">-</span></div>
            <div>💾 Данные: <span id="res-data">0</span></div>
        </div>

        <div class="main-content">
            <div class="panel-box">
                <h3>Управление рейдами</h3>
                <button class="farm-btn" id="btn-farm">⚡ Взломать Сеть (+1)</button>
                <div class="scroll-list" id="upgrades-list"></div>
            </div>

            <div class="panel-box">
                <h3>📋 Чат Клана</h3>
                <div class="scroll-list" id="chat-box"></div>
                <div class="net-row">
                    <input type="text" id="chat-input" placeholder="Сообщение..." maxlength="100">
                    <button id="btn-send">Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === НАСТРОЙКИ СВЯЗИ С SUPABASE (УЖЕ ЗАПОЛНЕНЫ) ===
        const SUPABASE_URL = "https://cbivrlziqtenfhrtxism.supabase.co";
        const SUPABASE_KEY = "sb_publishable_fe0ZmhwRL_K3vIVuvtZdtA_TdyUDOvm";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // === СОСТОЯНИЕ ИГРЫ ===
        let clanId = null;
        let myName = "Игрок_" + Math.floor(Math.random()*9000);
        let gameState = { score: 0, upgrades: { hacker: 0, bot: 0 } };
        let chatLogs = [];

        const upgConfig = {
            hacker: { name: "Младший Хакер", baseCost: 10, dps: 0.5 },
            bot: { name: "Боевой Скрипт", baseCost: 50, dps: 3 }
        };

        // Кнопка: Создать Клан
        document.getElementById('btn-create').addEventListener('click', async () => {
            clanId = "clan_" + Math.floor(Math.random() * 8999 + 1000);
            gameState = { score: 0, upgrades: { hacker: 0, bot: 0 } };
            chatLogs = [{ sender: "Система", msg: `${myName} создал клан!` }];

            await supabase.from('cyber_clans').insert([{ 
                id: clanId, score: 0, upgrades: gameState.upgrades, chat_logs: chatLogs 
            }]);

            startGame();
        });

        // Кнопка: Войти в Клан
        document.getElementById('btn-join').addEventListener('click', async () => {
            const inputId = document.getElementById('clan-id-input').value.trim();
            if(!inputId) return alert("Введите ID!");

            const { data, error } = await supabase.from('cyber_clans').select('*').eq('id', inputId).single();
            
            if(error || !data) return alert("Клан не найден!");

            clanId = inputId;
            gameState.score = Number(data.score);
            gameState.upgrades = data.upgrades;
            chatLogs = data.chat_logs || [];

            chatLogs.push({ sender: "Система", msg: `${myName} зашел в сеть клана!` });
            await saveToCloud();
            startGame();
        });

        function startGame() {
            document.getElementById('network-panel').style.display = 'none';
            document.getElementById('game-interface').style.display = 'grid';
            document.getElementById('clan-id-display').innerText = clanId;
            
            renderUpgrades();
            
            // Начинаем бесконечный цикл синхронизации с облаком (раз в 2 секунды)
            setInterval(syncWithCloud, 2000);
            // Пассивный локальный тик для плавности цифр
            setInterval(localTick, 250);
        }

        // Клик сбора данных
        document.getElementById('btn-farm').addEventListener('click', () => {
            gameState.score += 1;
            updateUI();
        });

        function localTick() {
            let dps = 0;
            for(let id in gameState.upgrades) {
                dps += (gameState.upgrades[id] || 0) * upgConfig[id].dps;
            }
            gameState.score += dps * 0.25;
            updateUI();
        }

        function updateUI() {
            document.getElementById('res-data').innerText = Math.floor(gameState.score);
            for(let id in upgConfig) {
                const item = document.getElementById(`upg-${id}`);
                if(item) {
                    let count = gameState.upgrades[id] || 0;
                    let cost = Math.floor(upgConfig[id].baseCost * Math.pow(1.4, count));
                    item.querySelector('.count').innerText = count;
                    item.querySelector('.cost').innerText = cost;
                    item.querySelector('button').disabled = gameState.score < cost;
                }
            }
        }

        function renderUpgrades() {
            const container = document.getElementById('upgrades-list');
            container.innerHTML = "";
            for(let id in upgConfig) {
                const div = document.createElement('div');
                div.className = 'upg-item';
                div.id = `upg-${id}`;
                div.innerHTML = `
                    <div><b>${upgConfig[id].name}</b> (<span class="count">0</span> шт.)</div>
                    <button onclick="buyUpg('${id}')"><span class="cost">0</span> 💾</button>
                `;
                container.appendChild(div);
            }
            updateUI();
        }

        window.buyUpg = function(id) {
            let count = gameState.upgrades[id] || 0;
            let cost = Math.floor(upgConfig[id].baseCost * Math.pow(1.4, count));
            if(gameState.score >= cost) {
                gameState.score -= cost;
                gameState.upgrades[id] = count + 1;
                chatLogs.push({ sender: "Лог", msg: `${myName} нанял ${upgConfig[id].name}` });
                updateUI();
                renderUpgrades();
                saveToCloud(); // Сразу отправляем покупку в облако
            }
        }

        // Логика чата
        document.getElementById('btn-send').addEventListener('click', async () => {
            const inp = document.getElementById('chat-input');
            if(!inp.value.trim()) return;
            chatLogs.push({ sender: myName, msg: inp.value.trim() });
            inp.value = "";
            renderChat();
            await saveToCloud();
        });

        function renderChat() {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            chatLogs.slice(-30).forEach(c => {
                const d = document.createElement('div');
                d.className = 'chat-msg';
                d.innerHTML = `<b>[${c.sender}]:</b> ${c.msg}`;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        }

        // Облачные функции сохранения и загрузки
        async function saveToCloud() {
            if(!clanId) return;
            await supabase.from('cyber_clans').update({
                score: gameState.score,
                upgrades: gameState.upgrades,
                chat_logs: chatLogs,
                updated_at: new Date()
            }).eq('id', clanId);
        }

        async function syncWithCloud() {
            if(!clanId) return;
            // Каждые 2 секунды вытягиваем свежие данные, которые мог изменить друг
            const { data } = await supabase.from('cyber_clans').select('*').eq('id', clanId).single();
            if(data) {
                // Если облачный счет больше (друг накликал), берем его. Заодно синхроним чат и апгрейды
                if(Number(data.score) > gameState.score) gameState.score = Number(data.score);
                gameState.upgrades = data.upgrades;
                chatLogs = data.chat_logs || [];
                renderChat();
                updateUI();
            }
            // Отправляем свои накопленные данные обратно
            await saveToCloud();
        }
    </script>
</body>
</html>
